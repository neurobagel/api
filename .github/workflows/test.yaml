name: Test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Launch test graph
      run: docker compose up -d test_graph

    # TODO: Check if this is necessary, since the Python dependencies setup also takes some time
    - name: Sleep to allow graph setup
      uses: jakejarvis/wait-action@master
      with:
        time: '5s'

    - name: Check running containers
      run: docker ps

    - name: Set up Python 3.10
      uses: actions/setup-python@v6
      with:
        python-version: "3.10"

    - name: Install uv
      uses: astral-sh/setup-uv@v5

    - name: Install dependencies
      run: |
        uv sync --group dev

    - name: Test with pytest
      run: |
        uv run pytest -m "integration or not integration" --cov --cov-branch --cov-report=xml

    - name: Upload results to Codecov
      uses: codecov/codecov-action@v6
      with:
        token: ${{ secrets.CODECOV_TOKEN }}


