services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: neurobagel
      POSTGRES_USER: ${NB_DB_USER:-nbuser}
      POSTGRES_PASSWORD: ${NB_DB_PASSWORD:-nbpassword}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: